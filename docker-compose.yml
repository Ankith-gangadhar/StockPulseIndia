version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: stockpulse_postgres
    environment:
      POSTGRES_USER: stockpulse
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: stockpulsedb
    ports:
      - "5433:5432"
    volumes:
      - stockpulse_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: stockpulse_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  stockpulse_pg_data:
  redis_data:
